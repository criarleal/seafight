<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kizilelma</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0f16;
      color: #cbd5e1;
    }

    .radar-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.2;
      z-index: 0;
    }

    .blur-circle-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 40%;
      height: 40%;
      background: rgba(30, 58, 138, 0.2);
      border-radius: 50%;
      filter: blur(120px);
    }

    .blur-circle-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 40%;
      height: 40%;
      background: rgba(127, 29, 29, 0.2);
      border-radius: 50%;
      filter: blur(120px);
    }

    .glass-panel {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(51, 65, 85, 0.5);
    }

    .animate-pulse-slow {
      animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0f16;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }
  </style>
</head>

<body class="selection:bg-blue-500/30">

  <div class="radar-bg">
    <div class="blur-circle-1"></div>
    <div class="blur-circle-2"></div>
  </div>

  <div class="relative max-w-5xl mx-auto p-4 md:p-8 z-10">

    <!-- Header -->
    <header class="flex flex-col md:flex-row items-center justify-between gap-6 mb-8 glass-panel p-6 rounded-2xl">
      <div class="flex items-center gap-4">
        <div class="bg-gradient-to-br from-blue-600 to-blue-400 p-3 rounded-xl shadow-lg shadow-blue-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white tracking-tight">Kizilelma</h1>
          <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold flex items-center gap-2">
            <span class="inline-block w-2 h-2 bg-emerald-500 rounded-full animate-pulse-slow"></span>
            <span>Allies & Enemies Management</span>
          </p>
        </div>
      </div>

      <div class="flex items-center gap-4">

        <div class="text-right hidden lg:block mr-2">
          <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">Last Update</p>
          <p id="last-update-time" class="text-sm font-mono text-slate-300">--:--:--</p>
        </div>

        
      </div>
    </header>

    <!-- Stats Panel -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="glass-panel p-4 rounded-2xl border-l-4 border-l-blue-500">
        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Total Allies</p>
        <p id="count-allies" class="text-2xl font-black text-white">0</p>
      </div>
      <div class="glass-panel p-4 rounded-2xl border-l-4 border-l-red-500">
        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Total Enemies</p>
        <p id="count-enemies" class="text-2xl font-black text-white">0</p>
      </div>
      <button id="export-enemies-btn"
        class="glass-panel p-4 rounded-2xl border-slate-700 hover:bg-slate-700/50 transition-all text-left group">
        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 group-hover:text-blue-400">Export Enemy IDs</p>
        <div class="flex items-center justify-between">
          <p class="text-sm font-bold text-slate-300">Copy IDs</p>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" class="text-slate-500 group-hover:text-blue-400">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
          </svg>
        </div>
      </button>
    </div>

    <!-- Filters & Search -->
    <div class="space-y-4 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="md:col-span-3 relative group">
          <div
            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 transition-colors group-focus-within:text-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
          </div>
          <input type="text" id="search-input" placeholder="Search player, ID or Guild TAG..."
            class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl pl-12 pr-4 py-4 text-white focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all text-lg placeholder:text-slate-600 shadow-xl" />
        </div>
        <div class="flex bg-slate-800/50 p-1.5 rounded-2xl border border-slate-700 h-full" id="filter-tabs">
          <button data-filter="all"
class="flex-1 rounded-xl text-[10px] font-black uppercase transition-all bg-slate-700 text-white shadow-inner filter-btn">
  All
</button>

<button data-filter="enemy"
class="flex-1 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500 hover:text-red-400 filter-btn">
  Enemies
</button>

<button data-filter="ally"
class="flex-1 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500 hover:text-blue-400 filter-btn">
  Allies
</button>
        </div>
      </div>

      <!-- Guild Filter Dropdown -->
      <div class="flex flex-col sm:flex-row items-center gap-4">
        <div class="w-full sm:w-64 relative">
          <select id="guild-selector"
            class="w-full bg-slate-800/50 border border-slate-700 px-4 py-3 rounded-xl text-sm font-bold text-slate-300 hover:bg-slate-700 focus:outline-none cursor-pointer appearance-none">
            <option value="all">All Guilds</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </div>
        </div>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Tactical data synchronized</p>
      </div>
    </div>

    <!-- Data List -->
<div id="results-container" class="grid gap-2"
     style="grid-template-columns: repeat(auto-fill,minmax(120px,1fr));">      <!-- Cards renderizados aqui -->
    </div>

    <!-- Notification Toast -->
    <div id="toast"
      class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full font-bold shadow-2xl opacity-0 translate-y-10 transition-all pointer-events-none z-50">
      Copied!
    </div>

    <!-- Footer -->
    <footer class="mt-12 mb-8 text-center">
      <p class="text-slate-600 text-[10px] font-bold uppercase tracking-[0.3em] flex items-center justify-center gap-2">
        <span>Live Tactical Sync Active</span>
      </p>
    </footer>
  </div>

  <script>
const guilds = [
  // ALLIES
  { tag: "»K«", type: "ally" },
  { tag: "«K»", type: "ally" },
  { tag: "ꞦØM", type: "ally" },

  { tag: "No1", type: "ally" },
  { tag: "Nᴏ1", type: "ally" },
  { tag: "ƬᴇK", type: "ally" },

  { tag: "LT", type: "ally" },
  { tag: "BYZ", type: "ally" },
  { tag: "ANG", type: "ally" },
  { tag: "EZF", type: "ally" },
  { tag: "PKS", type: "ally" },
  { tag: "W.G", type: "ally" },

  // NAP
  { tag: "*V*", type: "nap" },

  // ENEMIES
  { tag: "Ɓ†G", type: "enemy" },

  { tag: "ΛGΛ", type: "enemy" },

  { tag: "S»R", type: "enemy" },
  { tag: "GΣЯ", type: "enemy" },
  { tag: "КłZ", type: "enemy" },

  { tag: "1st", type: "enemy" },
  { tag: "ฬคг", type: "enemy" },
  { tag: "BGP", type: "enemy" },
  { tag: "RO", type: "enemy" },
  { tag: "HEL", type: "enemy" },
  { tag: "MVP", type: "enemy" },
  { tag: "D€L", type: "enemy" },
  { tag: "N¤S", type: "enemy" },
  { tag: "SAU", type: "enemy" },
  { tag: "HUN", type: "enemy" },
  { tag: "PΞH", type: "enemy" },
  { tag: "AԼƁ", type: "enemy" },
  { tag: "ŠAŤ", type: "enemy" },
  { tag: "ӨPӨ", type: "enemy" },
  { tag: "SĦ«", type: "enemy" },
  { tag: "BOR", type: "enemy" },
  { tag: "ĐSA", type: "enemy" },
  { tag: "Ǿxƒ", type: "enemy" },
  { tag: "MKᴀ", type: "enemy" },
  { tag: "3ØØ", type: "enemy" },
  { tag: "KKK", type: "enemy" },
  { tag: "ℋ.ℛ", type: "enemy" },
  { tag: "S҉C", type: "enemy" },
  { tag: "Čǒv", type: "enemy" },
  { tag: "ΙMṖ", type: "enemy" },
  { tag: "ĐIΣ", type: "enemy" },
  { tag: "Ko!", type: "enemy" },
  { tag: "Ro!", type: "enemy" },
  { tag: "CZE", type: "enemy" },
  { tag: "нu!", type: "enemy" },
  { tag: "Hu!", type: "enemy" },
  { tag: "F♣Я", type: "enemy" },
  { tag: "ฬ_ฬ", type: "enemy" },
  { tag: "ƊΣS", type: "enemy" },
  { tag: "ЯΣD", type: "enemy" },
  { tag: "-†-", type: "enemy" }
];

let filterType = "all";
let searchTerm = "";

function render() {
  const resultsContainer = document.getElementById("results-container");

  const filtered = guilds.filter(g => {
    const matchFilter = filterType === "all" || g.type === filterType;
    const matchSearch = g.tag.toLowerCase().includes(searchTerm.toLowerCase());
    return matchFilter && matchSearch;
  });

  document.getElementById("count-allies").innerText =
    guilds.filter(x => x.type === "ally").length;

  document.getElementById("count-enemies").innerText =
    guilds.filter(x => x.type === "enemy").length;

  resultsContainer.innerHTML = filtered.map(g => {
    const colors =
      g.type === "enemy"
        ? "border-red-500 text-red-400 bg-red-500/10"
        : g.type === "ally"
        ? "border-blue-500 text-blue-400 bg-blue-500/10"
        : "border-yellow-500 text-yellow-400 bg-yellow-500/10";

    return `
      <div class="glass-panel rounded-xl border-t-2 ${colors}">
        <div class="p-5 text-center">
          <div class="text-2xl font-black text-white">${g.tag}</div>
          <div class="text-xs uppercase font-bold mt-2 ${g.type === "enemy" ? "text-red-400" :
            g.type === "ally" ? "text-blue-400" : "text-yellow-400"}">
            ${g.type}
          </div>
        </div>
      </div>
    `;
  }).join("");
}

document.getElementById("search-input").addEventListener("input", e => {
  searchTerm = e.target.value;
  render();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    filterType = btn.dataset.filter;
    render();
  });
});

render();
</script>
</body>

</html>
