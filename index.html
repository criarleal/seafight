<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Seafight Player</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://criarleal.github.io/seafight/gif.gif') no-repeat center center;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        img {
            max-width: 1200px;
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            max-width: 1200px;
            border-radius: 10px;
        }

        h1 {
            color: #fff;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Vídeo -->
        <video controls autoplay loop>
            <source src="https://raw.githubusercontent.com/criarleal/seafight/main/4K.mp4" type="video/mp4">
            Seu navegador não suporta vídeo.
        </video>

    </div>

</body>

</html>
