<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resim Galerisi - İndir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .image-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.15);
        }
        #modal {
            display: none;
            backdrop-filter: blur(12px);
        }
        .modal-open {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans antialiased text-gray-900">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- Başlık Bölümü (Cabeçalho) -->
        <header class="mb-12 border-b border-gray-200 pb-6">
            <h1 class="text-4xl font-extrabold tracking-tight text-gray-900">Resim Kütüphanesi</h1>
            <p class="mt-2 text-lg text-gray-600">Detaylı görmek için küçük resme tıklayın veya dosyayı indirmek için düğmeyi kullanın.</p>
        </header>

        <!-- Galeri Izgarası (Grelha) -->
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Os cartões são injetados pelo JavaScript -->
        </div>
    </div>

    <!-- Tam Ekran Görüntüleme Modalı (Modal Full Screen) -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-4 md:p-10 cursor-zoom-out" onclick="closeModal()">
        <button class="absolute top-6 right-6 text-white/70 hover:text-white text-5xl font-light transition-colors" aria-label="Kapat">&times;</button>
        <img id="modal-img" src="" alt="Büyütülmüş görüntü" class="max-w-full max-h-full object-contain rounded shadow-2xl transition-transform duration-300 cursor-default" onclick="event.stopPropagation()">
    </div>

    <!-- Toast Notification (Feedback de Cópia) -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[60]">
        Bağlantı kopyalandı!
    </div>

    <script>
        // Imagens (K6 removido conforme solicitado)
        const images = [
            { id: 'K1', url: 'K1.png', title: 'Asset K1' },
            { id: 'K2', url: 'K2.png', title: 'Asset K2' },
            { id: 'K3', url: 'K3.png', title: 'Asset K3' },
            { id: 'K4', url: 'K4.png', title: 'Asset K4' },
            { id: 'K5', url: 'K5.png', title: 'Asset K5' },
            { id: 'K6', url: 'K6.png', title: 'Asset K6' }
        ];

        function openModal(url) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = url;
            modal.style.display = 'flex';
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        function downloadImage(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function copyToClipboard(text) {
            // Fallback para cópia em ambientes restritos
            const textArea = document.createElement("textarea");
            textArea.value = window.location.origin + window.location.pathname.replace(/[^\/]*$/, "") + text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Kopyalama hatası:', err);
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        function renderGallery() {
            const container = document.getElementById('gallery');
            container.innerHTML = images.map(img => `
                <div class="image-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200 flex flex-col">
                    <div class="relative cursor-pointer group flex-grow" onclick="openModal('${img.url}')">
                        <div class="aspect-video w-full bg-gray-200 overflow-hidden">
                            <img 
                                src="${img.url}" 
                                alt="${img.title}" 
                                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                                onerror="this.src='https://placehold.co/600x400?text=${img.id}+Bulunamadı'"
                            />
                        </div>
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-all flex items-center justify-center">
                            <div class="bg-white/90 backdrop-blur-sm text-gray-900 px-4 py-2 rounded-full font-semibold opacity-0 group-hover:opacity-100 transform translate-y-2 group-hover:translate-y-0 transition-all">
                                Tam Ekran Gör
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-6 bg-white border-t border-gray-50">
                        <div class="flex flex-col gap-4">
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold uppercase tracking-wider text-blue-600">PNG RESİM</span>
                                <span class="text-xs text-gray-400 font-medium">${img.id}</span>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800 leading-tight truncate">${img.title}</h3>
                            
                            <div class="flex gap-2">
                                <!-- Botão de Download -->
                                <button 
                                    onclick="downloadImage('${img.url}', '${img.url}')"
                                    class="flex-1 bg-gray-900 hover:bg-black text-white font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-gray-200 active:scale-95"
                                    title="İndir"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                    </svg>
                                    <span>İndir</span>
                                </button>

                                <!-- Botão de Copiar Link -->
                                <button 
                                    onclick="copyToClipboard('${img.url}')"
                                    class="bg-white border-2 border-gray-200 hover:border-gray-900 text-gray-900 font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center active:scale-95"
                                    title="Bağlantıyı Kopyala"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        window.onload = renderGallery;
    </script>
</body>
</html>
