<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kizilelma</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0f16;
      color: #cbd5e1;
    }

    .radar-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.2;
      z-index: 0;
    }

    .blur-circle-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 40%;
      height: 40%;
      background: rgba(30, 58, 138, 0.2);
      border-radius: 50%;
      filter: blur(120px);
    }

    .blur-circle-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 40%;
      height: 40%;
      background: rgba(127, 29, 29, 0.2);
      border-radius: 50%;
      filter: blur(120px);
    }

    .glass-panel {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(51, 65, 85, 0.5);
    }

    .animate-pulse-slow {
      animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0f16;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }
  </style>
</head>

<body class="selection:bg-blue-500/30">

  <div class="radar-bg">
    <div class="blur-circle-1"></div>
    <div class="blur-circle-2"></div>
  </div>

  <div class="relative max-w-5xl mx-auto p-4 md:p-8 z-10">

    <!-- Header -->
    <header class="flex flex-col md:flex-row items-center justify-between gap-6 mb-8 glass-panel p-6 rounded-2xl">
      <div class="flex items-center gap-4">
        <div class="bg-gradient-to-br from-blue-600 to-blue-400 p-3 rounded-xl shadow-lg shadow-blue-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white tracking-tight">Kizilelma</h1>
          <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold flex items-center gap-2">
            <span class="inline-block w-2 h-2 bg-emerald-500 rounded-full animate-pulse-slow"></span>
            <span>Allies & Enemies Management</span>
          </p>
        </div>
      </div>

      <div class="flex items-center gap-4">

        <div class="text-right hidden lg:block mr-2">
          <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">Last Update</p>
          <p id="last-update-time" class="text-sm font-mono text-slate-300">--:--:--</p>
        </div>

        <button id="sync-btn"
          class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-600/20">
          <svg id="sync-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
            <path d="M21 3v5h-5" />
          </svg>
          <span id="sync-btn-text">Sync Now</span>
        </button>
      </div>
    </header>

    <!-- Stats Panel -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="glass-panel p-4 rounded-2xl border-l-4 border-l-blue-500">
        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Total Allies</p>
        <p id="count-allies" class="text-2xl font-black text-white">0</p>
      </div>
      <div class="glass-panel p-4 rounded-2xl border-l-4 border-l-red-500">
        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Total Enemies</p>
        <p id="count-enemies" class="text-2xl font-black text-white">0</p>
      </div>
      <button id="export-enemies-btn"
        class="glass-panel p-4 rounded-2xl border-slate-700 hover:bg-slate-700/50 transition-all text-left group">
        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 group-hover:text-blue-400">Export Enemy IDs</p>
        <div class="flex items-center justify-between">
          <p class="text-sm font-bold text-slate-300">Copy IDs</p>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" class="text-slate-500 group-hover:text-blue-400">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
          </svg>
        </div>
      </button>
    </div>

    <!-- Filters & Search -->
    <div class="space-y-4 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="md:col-span-3 relative group">
          <div
            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 transition-colors group-focus-within:text-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
          </div>
          <input type="text" id="search-input" placeholder="Search player, ID or Guild TAG..."
            class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl pl-12 pr-4 py-4 text-white focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all text-lg placeholder:text-slate-600 shadow-xl" />
        </div>
        <div class="flex bg-slate-800/50 p-1.5 rounded-2xl border border-slate-700 h-full" id="filter-tabs">
          <button data-filter="all"
            class="flex-1 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500 hover:text-white filter-btn">All</button>
          <button data-filter="enemy"
            class="flex-1 rounded-xl text-[10px] font-black uppercase transition-all bg-red-500/20 text-red-400 shadow-inner filter-btn">Enemies</button>
          <button data-filter="ally"
            class="flex-1 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500 hover:text-blue-400 filter-btn">Allies</button>
        </div>
      </div>

      <!-- Guild Filter Dropdown -->
      <div class="flex flex-col sm:flex-row items-center gap-4">
        <div class="w-full sm:w-64 relative">
          <select id="guild-selector"
            class="w-full bg-slate-800/50 border border-slate-700 px-4 py-3 rounded-xl text-sm font-bold text-slate-300 hover:bg-slate-700 focus:outline-none cursor-pointer appearance-none">
            <option value="all">All Guilds</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </div>
        </div>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Tactical data synchronized</p>
      </div>
    </div>

    <!-- Data List -->
    <div id="results-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      <!-- Cards renderizados aqui -->
    </div>

    <!-- Notification Toast -->
    <div id="toast"
      class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full font-bold shadow-2xl opacity-0 translate-y-10 transition-all pointer-events-none z-50">
      Copied!
    </div>

    <!-- Footer -->
    <footer class="mt-12 mb-8 text-center">
      <p class="text-slate-600 text-[10px] font-bold uppercase tracking-[0.3em] flex items-center justify-center gap-2">
        <span>Live Tactical Sync Active</span>
      </p>
    </footer>
  </div>

  <script>
    const SHEET_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTNDU9rDhu7oFYp9NB0q8B6QEiqcmYqsYDa5OQOp8-Pjh6DKY-gzBrxDmFC-EFMmPLCJ3HYsminWUt/pub';
    const FRIENDS_TSV = `${SHEET_BASE}?gid=0&single=true&output=tsv`;
    const ENEMIES_TSV = `${SHEET_BASE}?gid=1987397581&single=true&output=tsv`;

    let players = [];
    let filterType = 'enemy';
    let selectedGuild = 'all';
    let searchTerm = '';

    const resultsContainer = document.getElementById('results-container');
    const searchInput = document.getElementById('search-input');
    const guildSelector = document.getElementById('guild-selector');
    const syncBtn = document.getElementById('sync-btn');
    const syncIcon = document.getElementById('sync-icon');
    const syncBtnText = document.getElementById('sync-btn-text');
    const lastUpdateTime = document.getElementById('last-update-time');
    const toast = document.getElementById('toast');

    function loadCache() {
      const cachedData = localStorage.getItem('sf_intel_v3_cache');
      const cachedTime = localStorage.getItem('sf_intel_v3_time');
      if (cachedData) {
        try {
          players = JSON.parse(cachedData);
          if (cachedTime) lastUpdateTime.innerText = cachedTime;
          updateGuildList();
          updateStats();
          render();
        } catch (e) {
          localStorage.removeItem('sf_intel_v3_cache');
        }
      }
    }

    function showToast(msg) {
      toast.innerText = msg;
      toast.classList.remove('opacity-0', 'translate-y-10');
      setTimeout(() => toast.classList.add('opacity-0', 'translate-y-10'), 2500);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const tmp = document.createElement('input');
        tmp.value = text;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        document.body.removeChild(tmp);
      });
      showToast('Copied!');
    }

    function parseCell(cellValue) {
      if (!cellValue || cellValue.trim() === '') return null;
      const cell = cellValue.trim();
      const idMatch = cell.match(/[（(]?(\d+\/\d+)[）)]?/);
      if (idMatch) {
        const id = idMatch[1];
        let name = cell.replace(/\s*[（(]?\d+\/\d+[）)]?\s*/, '').trim();
        if (!name) name = 'Unknown Player';
        return { name, id };
      }
      return { name: cell, id: '0/0' };
    }

    async function processTsv(url, type) {
      try {
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        if (text.includes('<!DOCTYPE html>') || text.includes('<html')) throw new Error('Got HTML instead of TSV');
        if (!text || text.trim() === '') return [];

        const rows = text.split('\n').map(r => r.split('\t').map(c => c.trim()));
        const nonEmpty = rows.filter(r => r.some(c => c !== ''));
        if (nonEmpty.length < 2) return [];

        const headerRow = nonEmpty[0];
        const dataRows = nonEmpty.slice(1);
        const extracted = [];

        for (let col = 0; col < headerRow.length; col++) {
          const guildName = headerRow[col];
          if (!guildName || guildName === '') continue;
          for (const row of dataRows) {
            if (!row[col] || row[col] === '') continue;
            const parsed = parseCell(row[col]);
            if (!parsed) continue;
            extracted.push({ name: parsed.name, id: parsed.id, guild: guildName, type });
          }
        }
        return extracted;
      } catch (e) {
        console.error(`[Error] ${type}:`, e.message);
        return null;
      }
    }

    async function fetchData() {
      syncIcon.classList.add('animate-spin');
      syncBtn.disabled = true;
      syncBtnText.innerText = 'Syncing...';

      try {
        const [friendsResult, enemiesResult] = await Promise.all([
          processTsv(FRIENDS_TSV, 'ally'),
          processTsv(ENEMIES_TSV, 'enemy')
        ]);

        if (friendsResult === null && enemiesResult === null) throw new Error('Connection failed for both sheets.');

        players = [...(friendsResult || []), ...(enemiesResult || [])];

        const timeString = new Date().toLocaleTimeString();
        lastUpdateTime.innerText = timeString;
        localStorage.setItem('sf_intel_v3_cache', JSON.stringify(players));
        localStorage.setItem('sf_intel_v3_time', timeString);

        updateGuildList();
        updateStats();
        render();

        if (friendsResult === null || enemiesResult === null) showToast('⚠️ Partial sync.');
        else if (players.length === 0) showToast('Sheet empty or format not recognized.');

      } catch (err) {
        console.error('Sync error:', err);
        showToast('Sync error!');
      } finally {
        syncIcon.classList.remove('animate-spin');
        syncBtn.disabled = false;
        syncBtnText.innerText = 'Sync Now';
      }
    }

    function updateGuildList() {
      const current = selectedGuild;
      guildSelector.innerHTML = '<option value="all">All Guilds</option>';
      const uniqueGuilds = [...new Set(players.map(p => p.guild))].sort();
      uniqueGuilds.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.innerText = g;
        guildSelector.appendChild(opt);
      });
      selectedGuild = uniqueGuilds.includes(current) ? current : 'all';
      guildSelector.value = selectedGuild;
    }

    function updateStats() {
      document.getElementById('count-allies').innerText = players.filter(p => p.type === 'ally').length;
      document.getElementById('count-enemies').innerText = players.filter(p => p.type === 'enemy').length;
    }

    function setFilter(type) {
      filterType = type;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = 'flex-1 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500 hover:text-white filter-btn';
      });
      const activeBtn = document.querySelector(`.filter-btn[data-filter="${type}"]`);
      if (activeBtn) {
        activeBtn.className = `flex-1 rounded-xl text-[10px] font-black uppercase transition-all shadow-inner filter-btn ${type === 'all' ? 'bg-slate-700 text-white' :
          type === 'enemy' ? 'bg-red-500/20 text-red-400' :
            'bg-blue-500/20 text-blue-400'
          }`;
      }
    }

    function render() {
      const searchLower = searchTerm.toLowerCase();
      const filtered = players.filter(p => {
        const matchesFilter = filterType === 'all' || p.type === filterType;
        const matchesGuild = selectedGuild === 'all' || p.guild === selectedGuild;
        const matchesSearch = !searchTerm ||
          p.name.toLowerCase().includes(searchLower) ||
          p.id.toLowerCase().includes(searchLower) ||
          p.guild.toLowerCase().includes(searchLower);
        return matchesFilter && matchesGuild && matchesSearch;
      });

      if (filtered.length === 0) {
        resultsContainer.innerHTML = `
                    <div class="text-center py-20 bg-slate-800/20 border border-dashed border-slate-700 rounded-3xl col-span-3">
                        <p class="text-slate-500 font-medium">No units found.</p>
                    </div>`;
        return;
      }

      resultsContainer.innerHTML = filtered.map(p => {
        const shortId = p.id.split('/')[1] || p.id;
        const isEnemy = p.type === 'enemy';
        const statusLabel = isEnemy ? 'Hostile' : 'Friendly';
        const enemyIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>';
        const allyIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';

        return `<div class="glass-panel rounded-xl overflow-hidden border-t-2 ${isEnemy ? 'border-t-red-500/70 hover:border-t-red-400' : 'border-t-blue-500/70 hover:border-t-blue-400'} transition-all hover:bg-slate-700/30 cursor-default">
                    <div class="p-3 flex flex-col gap-2">
                        <div class="flex items-center gap-2.5">
                            <div class="shrink-0 h-8 w-8 rounded-lg flex items-center justify-center ${isEnemy ? 'bg-red-500/10 text-red-500' : 'bg-blue-500/10 text-blue-400'}">${isEnemy ? enemyIcon : allyIcon}</div>
                            <p class="text-sm font-black text-white uppercase truncate leading-tight flex-1">${p.name}</p>
                        </div>
                        <div class="flex items-center justify-between gap-1">
                            <div class="flex items-center gap-1.5 min-w-0">
                                <span class="text-[10px] font-bold text-slate-400 truncate">${p.guild}</span>
                                <span class="w-1 h-1 rounded-full shrink-0 ${isEnemy ? 'bg-red-500' : 'bg-emerald-500'}"></span>
                                <span class="text-[10px] font-black uppercase shrink-0 ${isEnemy ? 'text-red-400' : 'text-emerald-400'}">${statusLabel}</span>
                            </div>
                            <button onclick="copyToClipboard('${shortId}')" title="Copy Map ID: ${shortId}" class="shrink-0 flex items-center gap-1 px-1.5 py-0.5 bg-slate-800 hover:bg-slate-600 text-slate-500 hover:text-emerald-400 rounded text-[9px] font-black uppercase transition-all border border-slate-700">
                                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                ${shortId}
                            </button>
                        </div>
                    </div>
                </div>`;
      }).join('');
    }

    // Event Listeners
    document.getElementById('export-enemies-btn').addEventListener('click', () => {
      const ids = players.filter(p => p.type === 'enemy' && p.id !== '0/0').map(p => p.id.split('/')[1] || p.id).join(', ');
      if (ids) copyToClipboard(ids);
      else showToast('No enemies with ID found.');
    });

    guildSelector.addEventListener('change', (e) => {
      selectedGuild = e.target.value;
      if (selectedGuild !== 'all') {
        const guildPlayers = players.filter(p => p.guild === selectedGuild);
        if (guildPlayers.length > 0) setFilter(guildPlayers[0].type);
      }
      render();
    });

    syncBtn.addEventListener('click', fetchData);
    searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; render(); });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { setFilter(btn.dataset.filter); render(); });
    });

    // Init
    setFilter('enemy');
    loadCache();
    fetchData();
  </script>
</body>

</html>
